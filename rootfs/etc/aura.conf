# AURA-AIOSCPU — Default System Configuration
# =============================================
# This file documents the default settings that live in config/default.json.
# To override, copy to config/user.json and edit.
#
# Environment variable overrides: AURA_CFG_<SECTION>_<KEY>=value
# Example: AURA_CFG_KERNEL_TICK_INTERVAL_MS=50
#
# Sections:  kernel | aura | services | hal | logging | mobile | watchdog | build

[kernel]
tick_interval_ms  = 16        # main loop interval; auto-tuned on mobile
adaptive_tick     = true      # back off to 1000ms when idle (saves battery)
max_task_queue    = 1000

[aura]
model_dir         = models
active_model      =           # leave blank to use stub (no file needed)
context_window    = 4096
max_response_tokens = 512

[services]
autostart         = true
max_services      = 32
restart_backoff_ms = 5000

[hal]
storage_path      = rootfs/var/aura.db
max_memory_mb     = 512

[logging]
level             = INFO
log_dir           = logs

[mobile]
tick_interval_ms  = 100       # 10 Hz on phones — balanced performance/battery
max_memory_mb     = 256

[watchdog]
enabled           = true
check_interval_ms = 5000
max_failures      = 3
auto_restart      = true
